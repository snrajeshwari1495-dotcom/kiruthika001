<!DOCTYPE html>
<html>
<head>
<title>Memory Card Game</title>

<style>

body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#5eff8e,#5aa9ff);
color:white;
text-align:center;
}

.game-box{
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:15px;
}

.grid{
display:grid;
gap:10px;
justify-content:center;
margin-top:20px;
}

.card{
width:70px;
height:70px;
background:#222;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
border-radius:10px;
}

button{
padding:10px 15px;
margin:8px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="game-box">

<h1>Memory Card Game</h1>

<h2>Level: <span id="level">1</span></h2>

<button onclick="dailyChallenge()">Daily Challenge</button>

<div class="grid" id="grid"></div>

<p id="status"></p>

<button onclick="nextLevel()">Next Level</button>
<button onclick="restart()">Restart</button>
<button onclick="goBack()">Back</button>

</div>

<script>

let level = 1;
let maxLevel = 500;

let symbols = ["🍎","🍌","🍇","🍒","🍉","🍍","🥝","🍑","🍋","🍓"];

let firstCard=null;
let secondCard=null;
let lock=false;
let matches=0;

function createBoard(){

let pairs = Math.min(2 + Math.floor(level/5), symbols.length);

let selected = symbols.slice(0,pairs);

let cards = [...selected,...selected];

cards.sort(()=>0.5 - Math.random());

let grid=document.getElementById("grid");

grid.innerHTML="";

grid.style.gridTemplateColumns = "repeat(4,70px)";

cards.forEach(symbol=>{

let card=document.createElement("div");

card.classList.add("card");

card.dataset.symbol=symbol;

card.onclick=flipCard;

grid.appendChild(card);

});

matches=0;

}

function flipCard(){

if(lock) return;

if(this.innerText!="") return;

this.innerText=this.dataset.symbol;

if(!firstCard){

firstCard=this;
return;

}

secondCard=this;

lock=true;

if(firstCard.dataset.symbol===secondCard.dataset.symbol){

matches++;

firstCard=null;
secondCard=null;
lock=false;

checkWin();

}

else{

setTimeout(()=>{

firstCard.innerText="";
secondCard.innerText="";

firstCard=null;
secondCard=null;

lock=false;

},700);

}

}

function checkWin(){

let totalPairs=document.querySelectorAll(".card").length/2;

if(matches===totalPairs){

document.getElementById("status").innerText="🎉 Level Completed!";

}

}

function nextLevel(){

if(level<maxLevel){

level++;

document.getElementById("level").innerText=level;

document.getElementById("status").innerText="";

firstCard=null;
secondCard=null;

createBoard();

}

}

function restart(){

firstCard=null;
secondCard=null;
document.getElementById("status").innerText="";
createBoard();

}

function dailyChallenge(){

let today=new Date();

let seed=today.getDate()+today.getMonth();

level=(seed % 20)+1;

document.getElementById("level").innerText=level;

document.getElementById("status").innerText="Daily Challenge Mode";

createBoard();

}

function goBack(){

window.location.href="choose.html";

}

createBoard();

</script>

</body>
</html>
