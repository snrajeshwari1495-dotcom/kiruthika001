<!DOCTYPE html>
<html>
<head>
<title>Rock Paper Scissors</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

color:white;
text-align:center;

background:linear-gradient(135deg,#ff5ea8,#5aa9ff);
}

h1{
font-size:50px;
margin-bottom:10px;
}

h2{
letter-spacing:4px;
color:black;
}

.score-box{
border:2px solid white;
padding:20px 60px;
font-size:30px;
margin:20px;
}

.buttons{
margin-top:20px;
}

.choice{
font-size:40px;
width:80px;
height:80px;
border-radius:50%;
border:none;
margin:10px;
cursor:pointer;
background:rgba(255,255,255,0.3);
}

.choice:hover{
background:rgba(255,255,255,0.6);
}

#result{
margin-top:25px;
font-size:20px;
}

.restart{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Choose To Win</h1>

<h2>ROCK PAPER SCISSORS</h2>

<div class="score-box">
<span id="playerScore">0</span> : <span id="computerScore">0</span>
</div>

<div class="buttons">

<button class="choice" onclick="play('rock')">✊</button>

<button class="choice" onclick="play('paper')">✋</button>

<button class="choice" onclick="play('scissors')">✌</button>

</div>

<p id="result"></p>

<button class="restart" onclick="restart()">Restart Game</button>

<br>

<button class="back" onclick="goBack()">⬅ Back</button>

<script>

let playerScore = 0;
let computerScore = 0;

function play(user){

let choices = ["rock","paper","scissors"];

let computer = choices[Math.floor(Math.random()*3)];

let result="";

if(user===computer){
result="It's a Draw!";
}
else if(
(user==="rock" && computer==="scissors") ||
(user==="paper" && computer==="rock") ||
(user==="scissors" && computer==="paper")
){
result="You Win!";
playerScore++;
}
else{
result="Computer Wins!";
computerScore++;
}

document.getElementById("playerScore").innerText=playerScore;
document.getElementById("computerScore").innerText=computerScore;

document.getElementById("result").innerText =
"You chose "+user+" | Computer chose "+computer+" → "+result;

}

function restart(){

playerScore=0;
computerScore=0;

document.getElementById("playerScore").innerText=0;
document.getElementById("computerScore").innerText=0;

document.getElementById("result").innerText="";

}

function goBack(){

window.location.href="choose.html";

}

</script>

</body>
</html>
